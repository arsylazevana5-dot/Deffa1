name: Web to APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      icon_url:
        description: 'Icon URL'
        required: true
        type: string

jobs:
  build:
    name: Build Web to APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create WebView Project
        run: |
          flutter create --org com.webtoapk --project-name webtoapk webtoapk
          cd webtoapk
          
          # Tambah webview_flutter
          echo "" >> pubspec.yaml
          echo "dependencies:" >> pubspec.yaml
          echo "  webview_flutter: ^4.4.2" >> pubspec.yaml
          
          # Ganti main.dart
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(MyApp());

          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData(primarySwatch: Colors.blue),
                home: WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            @override
            _WebViewScreenState createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(Uri.parse('${{ inputs.web_url }}'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('${{ inputs.app_name }}'),
                  backgroundColor: Colors.blue,
                ),
                body: WebViewWidget(controller: controller),
              );
            }
          }
          EOF

          mkdir -p android/app/src/main/res/drawable/
          curl -L -o android/app/src/main/res/drawable/ic_launcher.png "${{ inputs.icon_url }}"

      - name: Install Dependencies
        run: |
          cd webtoapk
          flutter pub get

      - name: Build APK
        run: |
          cd webtoapk
          flutter build apk --release

      - name: Upload APK to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webtoapk-apk
          path: webtoapk/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
