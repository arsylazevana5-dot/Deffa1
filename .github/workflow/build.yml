name: Build APK from ZIP

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL Download ZIP Project'
        required: true
        type: string
      tag:
        description: 'Release Tag untuk Upload'
        required: true
        type: string
      build_type:
        description: 'Mode Build'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Download ZIP Project
        run: |
          echo "📥 Downloading ZIP from ${{ inputs.zip_url }}"
          curl -L -o project.zip "${{ inputs.zip_url }}"
          echo "📦 ZIP downloaded: $(ls -lh project.zip)"

      - name: Extract Project
        run: |
          mkdir -p project
          unzip -q project.zip -d project
          echo "📂 Project extracted:"
          ls -la project/

      - name: Install Dependencies
        run: |
          cd project
          flutter pub get

      - name: Clean Build
        run: |
          cd project
          flutter clean

      - name: Build APK
        run: |
          cd project
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Find APK
        run: |
          echo "📦 Looking for APK..."
          find . -name "*.apk" -ls || echo "❌ APK not found!"

      - name: Upload APK to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.build_type }}
          path: |
            **/build/app/outputs/flutter-apk/*.apk
            **/build/app/outputs/apk/**/*.apk
          retention-days: 7

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.tag }}
          asset_path: **/build/app/outputs/flutter-apk/*.apk
          asset_name: app-${{ inputs.build_type }}.apk
          asset_content_type: application/vnd.android.package-archive
